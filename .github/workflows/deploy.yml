name: Deploy Next.js to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10  # Or 'latest' if you prefer the newest version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 21
          cache: 'pnpm'  # Enable pnpm caching for faster installs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile  # Use pnpm and respect lockfile

      #- name: Lint code
      #  run: pnpm run lint  # Run linting to catch issues early

      - name: Build Next.js
        run: pnpm run build  # Builds and exports static files to 'out' directory

      - name: Verify build output
        run: ls -la out/  # Quick check to ensure 'out' directory exists and has content

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./out s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "*" \
            --include "_next/*" \
            --include "index.html" \
            --include "index.txt" \
            --include "404.html"